_id: giveaways_classic
datasworn_version: '0.1.0'
type: expansion
ruleset: classic
<<: &Source
  title: 'Ironsworn Discord Giveaway Assets'
  license: https://creativecommons.org/licenses/by/4.0
  url: https://ironswornrpg.com
  date: 2026-04-04
  authors:
    - name: Shawn Tomkin
assets:
  giveaways:
    type: asset_collection
    _source:
      <<: *Source
    name: Giveaway Assets
    contents:
      bearer:
        name: Bearer
        type: asset
        category: Path
        _source:
          <<: *Source
          authors:
            - name: Shawn Tomkin
            - name: DiceGoblin
          date: 2026-02-07
        options:
          name:
            label: relic
            field_type: text
        abilities:
          - text: |-
              You carry a relic of eldritch power. Envision its form and nature. When you make a move wielding or aided by this object, use a D8 relic die as your action die. If you roll a 1 on that die, the powers backfire; in addition to the outcome of the move, [Endure Harm](datasworn:move:classic/suffer/endure_harm) (-3) or [Endure Stress](datasworn:move:classic/suffer/endure_stress) (-3). If you are separated from the relic, this asset counts as an impact.
            enabled: true
            enhance_moves:
              - roll_type: action_roll
                trigger:
                  conditions:
                    - text: When you make a move wielding or aided by this object
                      roll_options: null
                      method: null
          - text: |-
              When you roll a 7 or 8 on your relic die, you are one with the eldritch powers of the relic. Take an automatic strong hit and +1 momentum.
          - text: |-
              When you successfully [Fulfill Your Vow](datasworn:move:classic/quest/fulfill_your_vow) in a quest (extreme or epic) to free yourself of the relic, activate this ability at no cost, make a final roll of the relic die, and discard this asset. On 3–8, you embody lingering powers of the relic; improve a stat by +1. On 1–2, improve a stat by +1, but the relic leaves a mark; reduce your max health or spirit to 4.
      stone_lizard:
        name: Stone Lizard
        type: asset
        category: Companion
        _source:
          <<: *Source
          authors:
            - name: Shawn Tomkin
            - name: Korokage
          date: 2026-04-04
        options:
          name:
            label: name
            field_type: text
            value: null
        requirement: Your lizard guides you into the depths.
        abilities:
          - name: Instinctive
            text: |-
              When you [Delve The Depths](datasworn:move:delve/delve/delve_the_depths) +wits by trusting the lizard’s instincts, you are forewarned. On a weak hit, roll twice on the [Delve The Depths](datasworn:move.oracle_rollable:delve/delve/delve_the_depths.wits) table and choose one result. If you then [Reveal a Danger](datasworn:move:delve/delve/reveal_a_danger), take +1 momentum.
            enhance_moves:
              - enhances:
                  - move:delve/delve/delve_the_depths
                roll_type: action_roll
                trigger:
                  conditions:
                    - text: By trusting the lizard’s instincts
                      method: player_choice
                      roll_options:
                        - using: stat
                          stat: wits
          - name: Camouflaging
            text: |-
              When you [Face Danger](datasworn:move:classic/adventure/face_danger) by hiding or [Secure an Advantage](datasworn:move:classic/adventure/secure_an_advantage) by readying an ambush, add +lizard’s health.

            enhance_moves:
              - enhances:
                  - move:classic/adventure/face_danger
                roll_type: action_roll
                trigger:
                  conditions:
                    - text: By hiding
                      method: player_choice
                      roll_options:
                        - using: asset_control
                          control: health
                          assets: null
              - enhances:
                  - move:classic/adventure/secure_an_advantage
                roll_type: action_roll
                trigger:
                  conditions:
                    - text: By readying an ambush
                      method: player_choice
                      roll_options:
                        - using: asset_control
                          control: health
                          assets: null
          - name: Reactive
            text: |-
              When you [Clash](datasworn:move:classic/combat/clash) and roll a 10 on a challenge die, the lizard joins the fray; reroll any dice.
            enhance_moves:
              - enhances:
                  - move:classic/combat/clash
                roll_type: action_roll
                trigger:
                  conditions:
                    - text: Roll a 10 on a challenge die
                      roll_options: null
                      method: null
        controls:
          health:
            max: 3
            value: 3
            field_type: condition_meter
            label: health
            moves:
              suffer:
                - move:classic/suffer/companion_endure_harm
              recover:
                - move:classic/adventure/heal
                - move:classic/adventure/make_camp
                - move:classic/relationship/sojourn
