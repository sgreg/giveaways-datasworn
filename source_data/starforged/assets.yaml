_id: giveaways_starforged
datasworn_version: '0.1.0'
type: expansion
ruleset: starforged
<<: &Source
  title: 'Ironsworn Discord Giveaway Assets'
  license: https://creativecommons.org/licenses/by/4.0
  url: https://ironswornrpg.com
  date: 2026-05-12
  authors:
    - name: Shawn Tomkin
assets:
  giveaways:
    type: asset_collection
    _source:
      <<: *Source
    name: Giveaway Assets
    contents:
      bearer:
        name: Bearer
        <<: &PathAsset
          type: asset
          category: Path
          color: '#3f7faa'
        _source:
          <<: *Source
          authors:
            - name: Shawn Tomkin
            - name: DiceGoblin
          date: 2026-02-07
        tags:
          starforged:
            recommended: true
          sundered_isles:
            recommended: true
          _core:
            supernatural: true
        options:
          name:
            label: relic
            field_type: text
        abilities:
          - text: |-
              You carry a relic of eldritch power. Envision its form and nature. When you make a move wielding or aided by this object, use a D8 relic die as your action die. If you roll a 1 on that die, the powers backfire; in addition to the outcome of the move, [Endure Harm](datasworn:move:starforged/suffer/endure_harm) (-3) or [Endure Stress](datasworn:move:starforged/suffer/endure_stress) (-3). If you are separated from the relic, this asset counts as an impact.
            enabled: true
            enhance_moves:
              - roll_type: action_roll
                trigger:
                  conditions:
                    - text: When you make a move wielding or aided by this object
                      roll_options: null
                      method: null
          - text: |-
              When you roll a 7 or 8 on your relic die, you are one with the eldritch powers of the relic. Take an automatic strong hit and +1 momentum.
          - text: |-
              When you successfully [Fulfill Your Vow](datasworn:move:starforged/quest/fulfill_your_vow) in a quest (extreme or epic) to free yourself of the relic, activate this ability at no cost, make a final roll of the relic die, and discard this asset. On 3–8, you embody lingering powers of the relic; improve a stat by +1. On 1–2, improve a stat by +1, but the relic leaves a mark; reduce your max health or spirit to 4.
      forger:
        name: Forger
        <<: *PathAsset
        _source:
          <<: *Source
          authors:
            - name: Shawn Tomkin
            - name: everhaunted
          date: 2026-01-16
        tags:
          starforged:
            recommended: true
          sundered_isles:
            recommended: true
        abilities:
          - text: &ForgeDocumentMove |-
              When you prepare or craft a forged object or document, roll +shadow or +wits. On a strong hit, it’s a flawless reproduction; you or an ally may reroll any dice when making a move using the forgery as leverage or proof. On a weak hit, it’s subtly flawed; you or an ally may reroll one die when making a move using the forgery. On a miss, as with a weak hit, but you waste time or resources in the process: [Lose Momentum](datasworn:move:starforged/suffer/lose_momentum) (-2) or [Sacrifice Resources](datasworn:move:starforged/suffer/sacrifice_resources) (-2).
            enabled: true
            moves:
              forge_document:
                name: Forge Document
                type: move
                roll_type: action_roll
                trigger:
                  text: When you prepare or craft a forged object or document...
                  conditions:
                    - method: player_choice
                      roll_options:
                        - using: stat
                          stat: shadow
                        - using: stat
                          stat: wits
                text: *ForgeDocumentMove
                outcomes:
                  strong_hit:
                    text: |-
                      On a __strong hit__, it’s a flawless reproduction; you or an ally may reroll any dice when making a move using the forgery as leverage or proof.
                  weak_hit:
                    text: |-
                      On a __weak hit__, it’s subtly flawed; you or an ally may reroll one die when making a move using the forgery.
                  miss:
                    text: |-
                      On a __miss__, it’s subtly flawed; you or an ally may reroll one die when making a move using the forgery. However, you waste time or resources in the process: [Lose Momentum](datasworn:move:starforged/suffer/lose_momentum) (-2) or [Sacrifice Resources](datasworn:move:starforged/suffer/sacrifice_resources) (-2)
          - text: |-
              When you or an ally [Resupply](datasworn:move:starforged/recover/resupply) using a forgery as payment or collateral, take +1 supply on a hit.
            enhance_moves:
              - roll_type: action_roll
                enhances:
                  - move:starforged/recover/resupply
                trigger:
                  conditions:
                    - text: Using a forgery as payment or collateral
                      roll_options: null
                      method: null
          - text: |-
              When you prepare forged identification, you or an ally take +2 momentum when first adopting the persona. In addition, for as long as the ruse remains undetected and relevant to the situation, increase the imposter’s momentum reset by 1.
      mutated:
        name: Mutated
        <<: *PathAsset
        _source:
          <<: *Source
          authors:
            - name: Shawn Tomkin
            - name: sumnox
          date: 2026-05-12
        abilities:
          - text: |-
              You are afflicted with a mutation. When you make a move bolstered by the change, add +2 and fill one segment of an 8-segment clock. When the clock is filled, choose one and clear the clock.
              ✴ Raise one stat by 1 (max 5), and reduce another by 1 (min 0). Mark both stats as corrupted.
              ✴ Discard one path asset for another with 2 marked abilities. This asset is corrupted.
            enabled: true
            controls:
              clock:
                label: mutation manifests
                field_type: clock
                max: 8
                value: 0
                min: 0
          - text: |-
              Once a stat is corrupted twice, or all path assets are corrupted, activate this ability at no cost. The mutation takes hold, prevailing against an otherwise-unbeatable threat. Envision your new form and discard this asset.
          - text: |-
              When you successfully [Fulfill Your Vow](datasworn:move:starforged/quest/fulfill_your_vow) (extreme or greater) to halt the mutation, activate this ability at no cost. Increase your momentum reset by 1, and discard this asset.
      pactbound:
        name: Pactbound
        <<: *PathAsset
        _source:
          <<: *Source
          authors:
            - name: Shawn Tomkin
            - name: WolfJuggler
          date: 2026-03-16
        tags:
          starforged:
            recommended: true
          sundered_isles:
            recommended: true
          _core:
            supernatural: true
        options:
          name:
            label: entity
            field_type: text
        abilities:
          - text: |-
              When you [Make a Connection](datasworn:move:starforged/connection/make_a_connection) by sealing a pact with an otherworldly entity (extreme or epic), take an automatic weak hit and spend 1 experience to gain this asset. The entity has no physical presence, but you may use the connection bonus when you make a move that serves its will and channels its powers. If the connection is lost, discard this asset.
            enabled: true
            enhance_moves:
              - enhances:
                  - move:starforged/connection/make_a_connection
                roll_type: action_roll
                trigger:
                  conditions:
                    - text: By sealing a pact with an otherworldly entity
                      roll_options: null
                      method: null
          - text: |-
              When you [Face Death](datasworn:move:starforged/threshold/face_death) or [Face Desolation](datasworn:move:starforged/threshold/face_desolation), envision an encounter with the entity in its otherworldly domain and reroll any dice. On a strong hit, take +2 momentum and set your health and spirit to their max value.
            enhance_moves:
              - enhances:
                  - move:starforged/threshold/face_death
                  - move:starforged/threshold/face_desolation
                roll_type: action_roll
          - text: |-
              When you [Test Your Relationship](datasworn:move:starforged/connection/test_your_relationship) after resisting or betraying the entity, choose one.
                ✴ Recommit to its purpose: reroll any dice.
                ✴ Hide your intentions: roll +shadow (instead of heart); on a strong hit, mark two ticks on your quests legacy track.
            enhance_moves:
              - enhances:
                  - move:starforged/connection/test_your_relationship
                roll_type: action_roll
                trigger:
                  conditions:
                    - text: After resisting or betraying the entity
                      roll_options: null
                      method: null
